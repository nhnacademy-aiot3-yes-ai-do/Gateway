name: pr-check

on:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: dependency:tree 출력 (충돌 확인용)
        run: mvn -B dependency:tree
      - name: Build
        run: mvn -B clean package -DskipTests
      - name: Docker 이미지 빌드 테스트 (push는 안 함)
        run: docker build -t gateway-service:pr-test .