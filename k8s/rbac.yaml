apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-discovery-role
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-discovery-binding
subjects:
  - kind: ServiceAccount
    name: gateway-sa
roleRef:
  kind: Role
  name: gateway-discovery-role
  apiGroup: rbac.authorization.k8s.io