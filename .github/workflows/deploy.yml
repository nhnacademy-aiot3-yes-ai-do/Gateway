name: deploy

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: 이미지 이름 소문자로 변환
        id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Notify Discord Deploy Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "✅ Gateway 배포 성공",
              "embeds": [
                {
                  "title": "Gateway Kubernetes Deploy Success",
                  "description": "gateway-service rollout이 완료되었습니다.",
                  "color": 5763719,
                  "fields": [
                    {
                      "name": "Repository",
                      "value": "${{ github.repository }}",
                      "inline": true
                    },
                    {
                      "name": "Branch",
                      "value": "${{ github.ref_name }}",
                      "inline": true
                    },
                    {
                      "name": "Commit",
                      "value": "${{ github.sha }}",
                      "inline": false
                    },
                    {
                      "name": "Actor",
                      "value": "${{ github.actor }}",
                      "inline": true
                    },
                    {
                      "name": "Workflow",
                      "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "inline": false
                    }
                  ]
                }
              ]
            }' \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Notify Discord Deploy Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "❌ Gateway 배포 실패",
              "embeds": [
                {
                  "title": "Gateway CI/CD Failed",
                  "description": "빌드, 이미지 push, 서버 SSH, kubectl apply 또는 rollout 중 실패했습니다.",
                  "color": 15548997,
                  "fields": [
                    {
                      "name": "Repository",
                      "value": "${{ github.repository }}",
                      "inline": true
                    },
                    {
                      "name": "Branch",
                      "value": "${{ github.ref_name }}",
                      "inline": true
                    },
                    {
                      "name": "Actor",
                      "value": "${{ github.actor }}",
                      "inline": true
                    },
                    {
                      "name": "Workflow",
                      "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "inline": false
                    }
                  ]
                }
              ]
            }' \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy k8s manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/*"
          target: "/tmp/gateway-k8s"

      - name: Apply manifests and roll out new image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$HOME/bin:$PATH
            kubectl apply -f /tmp/gateway-k8s/k8s/
            kubectl set image deployment/gateway-service gateway-service=${{ needs.build-and-push.outputs.image_name }}:${{ github.sha }}
            kubectl rollout status deployment/gateway-service --timeout=90s
            rm -rf /tmp/gateway-k8s