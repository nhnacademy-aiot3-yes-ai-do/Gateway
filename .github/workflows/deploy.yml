name: deploy

on:
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      simulate_deploy_failure:
        description: "존재하지 않는 이미지로 롤백 테스트"
        required: true
        type: boolean
        default: false

concurrency:
  group: gateway-production
  cancel-in-progress: false
env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test-and-coverage-sonarqube:
    runs-on: ubuntu-latest

    outputs:
      coverage_result: ${{ steps.coverage.outcome }}
      coverage_percentage: ${{ steps.sonar_metrics.outputs.coverage_percentage }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw -B clean test

      - name: Check JaCoCo 40% coverage
        id: coverage
        run: ./mvnw -B -DskipTests verify

      - name: Run SonarQube Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      - name: Read SonarQube coverage
        id: sonar_metrics
        env:
          SONAR_API_TOKEN: ${{ secrets.SONAR_API_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: yes-nhn_gateway-service
        run: |
          echo "coverage_percentage=not_available" >> "$GITHUB_OUTPUT"

          SONAR_BASE_URL="${SONAR_HOST_URL%/}"

          if ! RESPONSE="$(
            curl --fail --show-error --silent \
              --get "$SONAR_BASE_URL/api/measures/component" \
              --header "Authorization: Bearer $SONAR_API_TOKEN" \
              --data-urlencode "component=$SONAR_PROJECT_KEY" \
              --data-urlencode "metricKeys=coverage"
          )"; then
            echo "::warning::SonarQube coverage 조회에 실패했습니다."
            exit 0
          fi

          COVERAGE="$(
            echo "$RESPONSE" |
              jq -r '.component.measures[]
                | select(.metric == "coverage")
                | .value'
          )"

          if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "null" ]; then
            echo "::warning::SonarQube 응답에 coverage 값이 없습니다."
            exit 0
          fi

          echo "coverage_percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          

  build-and-push:
    needs: test-and-coverage-sonarqube
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.image.outputs.name }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 이미지 이름 소문자로 변환
        id: image
        run: |
          echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  request-central-deploy:
    needs: [test-and-coverage-sonarqube, build-and-push]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create Config GitHub App token
        id: config-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: Config
          permission-contents: write

      - name: Request Config deployment
        env:
          GH_TOKEN: ${{ steps.config-app-token.outputs.token }}
          CONFIG_REPOSITORY: ${{ github.repository_owner }}/Config
          IMAGE_NAME: ${{ needs.build-and-push.outputs.image_name }}
          QUALITY_RESULT: ${{ needs.test-and-coverage-sonarqube.result }}
          COVERAGE_RESULT: ${{ needs.test-and-coverage-sonarqube.outputs.coverage_result }}
          COVERAGE_PERCENTAGE: ${{ needs.test-and-coverage-sonarqube.outputs.coverage_percentage }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
          SONAR_URL: ${{ vars.SONAR_DASHBOARD_URL }}
          SIMULATE_FAILURE: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_deploy_failure || false }}
        run: |          
          set -euo pipefail

          COVERAGE_RESULT="${COVERAGE_RESULT:-not_configured}"
          COVERAGE_PERCENTAGE="${COVERAGE_PERCENTAGE:-not_available}"
          SONAR_URL="${SONAR_URL:-not_available}"
          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          IMAGE_NAME="${IMAGE_NAME:-not_available}"

          case "$SIMULATE_FAILURE" in
            true|false) ;;
            *) SIMULATE_FAILURE=false ;;
          esac

          jq -n \
            --arg image_name "$IMAGE_NAME" \
            --arg service_name "gateway-service" \
            --arg repository "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit_sha "${{ github.sha }}" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg actor "${{ github.actor }}" \
            --arg quality_result "$QUALITY_RESULT" \
            --arg coverage_result "$COVERAGE_RESULT" \
            --arg coverage_percentage "$COVERAGE_PERCENTAGE" \
            --arg sonar_url "$SONAR_URL" \
            --arg build_result "$BUILD_RESULT" \
            --arg workflow_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson simulate_failure "$SIMULATE_FAILURE" \
            '{
              event_type: "deploy-service",
              client_payload: {
                service: {
                  name: $service_name,
                  repository: $repository,
                  branch: $branch
                },
                commit: {
                  sha: $commit_sha,
                  message: $commit_message,
                  actor: $actor
                },
                quality: {
                  result: $quality_result,
                  coverage_result: $coverage_result,
                  coverage_percentage: $coverage_percentage,
                  sonar_url: $sonar_url
                },
                build: {
                  result: $build_result,
                  image_name: $image_name
                },
                source: {
                  workflow_url: $workflow_url
                },
                options: {
                  simulate_deploy_failure: $simulate_failure
                }
              }
            }' > dispatch.json

          gh api \
            --method POST \
            "repos/$CONFIG_REPOSITORY/dispatches" \
            --input dispatch.json
          
          echo "Config 중앙 배포 요청 완료: $CONFIG_REPOSITORY"