name: deploy

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: 이미지 이름 소문자로 변환
        id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy k8s manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/*"
          target: "/tmp/gateway-k8s"

      - name: Apply manifests and roll out new image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$HOME/bin:$PATH
            kubectl apply -f /tmp/gateway-k8s/k8s/
            kubectl set image deployment/gateway-service gateway-service=${{ needs.build-and-push.outputs.image_name }}:${{ github.sha }}
            kubectl rollout status deployment/gateway-service --timeout=90s
            rm -rf /tmp/gateway-k8s

  notify:
    needs: [ build-and-push, deploy ]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$BUILD_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            TITLE="Gateway Kubernetes Deploy Success"
            CONTENT="✅ Gateway 배포 성공"
            DESCRIPTION="gateway-service rollout이 완료되었습니다."
            COLOR="5763719"
          else
            TITLE="Gateway CI/CD Failed"
            CONTENT="❌ Gateway 배포 실패"
            DESCRIPTION="빌드, 이미지 push, 서버 SSH, kubectl apply 또는 rollout 중 실패했습니다."
            COLOR="15548997"
          fi
          
          COMMIT_SHORT=$(echo "$COMMIT_SHA" | cut -c1-7)
          
          jq -n \
            --arg content "$CONTENT" \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --arg repository "$REPOSITORY" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_SHORT" \
            --arg commitMessage "$COMMIT_MESSAGE" \
            --arg actor "$ACTOR" \
            --arg workflow "$WORKFLOW_URL" \
            --arg buildResult "$BUILD_RESULT" \
            --arg deployResult "$DEPLOY_RESULT" \
            --argjson color "$COLOR" \
            '{
              content: $content,
              embeds: [
                {
                  title: $title,
                  description: $description,
                  color: $color,
                  fields: [
                    { name: "Repository", value: $repository, inline: true },
                    { name: "Branch", value: $branch, inline: true },
                    { name: "Commit", value: $commit, inline: true },
                    { name: "Commit Message", value: $commitMessage, inline: false },
                    { name: "Actor", value: $actor, inline: true },
                    { name: "Build", value: $buildResult, inline: true },
                    { name: "Deploy", value: $deployResult, inline: true },
                    { name: "Workflow", value: $workflow, inline: false }
                  ]
                }
              ]
            }' > discord-payload.json
          
          curl --fail --show-error --silent \
            --connect-timeout 5 \
            --max-time 15 \
            --retry 2 \
            --retry-delay 2 \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"