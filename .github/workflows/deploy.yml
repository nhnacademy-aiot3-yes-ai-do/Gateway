name: deploy

on:
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      simulate_deploy_failure:
        description: "존재하지 않는 이미지로 롤백 테스트"
        required: true
        type: boolean
        default: false

concurrency:
  group: gateway-production
  cancel-in-progress: false
env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test-and-coverage-sonarqube:
    runs-on: ubuntu-latest

    outputs:
      coverage_result: ${{ steps.coverage.outcome }}
      coverage_percentage: ${{ steps.sonar_metrics.outputs.coverage_percentage }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw -B clean test

      - name: Check JaCoCo 40% coverage
        id: coverage
        run: ./mvnw -B -DskipTests verify

      - name: Run SonarQube Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      - name: Read SonarQube coverage
        id: sonar_metrics
        env:
          SONAR_API_TOKEN: ${{ secrets.SONAR_API_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: yes-nhn_gateway-service
        run: |
          echo "coverage_percentage=not_available" >> "$GITHUB_OUTPUT"

          SONAR_BASE_URL="${SONAR_HOST_URL%/}"

          if ! RESPONSE="$(
            curl --fail --show-error --silent \
              --get "$SONAR_BASE_URL/api/measures/component" \
              --header "Authorization: Bearer $SONAR_API_TOKEN" \
              --data-urlencode "component=$SONAR_PROJECT_KEY" \
              --data-urlencode "metricKeys=coverage"
          )"; then
            echo "::warning::SonarQube coverage 조회에 실패했습니다."
            exit 0
          fi

          COVERAGE="$(
            echo "$RESPONSE" |
              jq -r '.component.measures[]
                | select(.metric == "coverage")
                | .value'
          )"

          if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "null" ]; then
            echo "::warning::SonarQube 응답에 coverage 값이 없습니다."
            exit 0
          fi

          echo "coverage_percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          

  build-and-push:
    needs: test-and-coverage-sonarqube
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.image.outputs.name }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 이미지 이름 소문자로 변환
        id: image
        run: |
          echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Copy k8s manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/*"
          target: "/tmp/gateway-k8s-${{ github.run_id }}"

      - name: Apply manifests and roll out new image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            export PATH=$HOME/bin:$PATH

            DIR="/tmp/gateway-k8s-${{ github.run_id }}"
            IMAGE="${{ needs.build-and-push.outputs.image_name }}"
            TARGET_TAG="${{ github.sha }}"
            
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
              && [ "${{ inputs.simulate_deploy_failure }}" = "true" ]; then
              TARGET_TAG="${{ github.sha }}-rollback-test-missing"
              echo "롤백 테스트 모드: 존재하지 않는 이미지 태그를 사용합니다."
            fi
            
            trap 'rm -rf "$DIR"' EXIT

            PREVIOUS_REVISION="$(
              kubectl get deployment gateway-service \
                -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' \
                2>/dev/null || true
            )"
            PREVIOUS_IMAGE="$(
              kubectl get deployment gateway-service \
                -o jsonpath='{.spec.template.spec.containers[?(@.name=="gateway-service")].image}' \
                2>/dev/null || true
            )"

            kubectl apply -f "$DIR/k8s/rbac.yaml"
            kubectl apply -f "$DIR/k8s/configmap.yaml"
            kubectl apply -f "$DIR/k8s/service.yaml"
            kubectl apply -f "$DIR/k8s/ingress.yaml"

            kubectl set image \
              -f "$DIR/k8s/deployment.yaml" \
              gateway-service="$IMAGE:$TARGET_TAG" \
              --local -o yaml |
              kubectl apply -f -

            if ! kubectl rollout status deployment/gateway-service --timeout=210s; then
              echo "배포 실패 - 직전 Revision으로 롤백을 시도합니다"

              if [ -z "$PREVIOUS_REVISION" ] || [ -z "$PREVIOUS_IMAGE" ]; then
                echo "롤백 대상이 없습니다. 최초 배포 여부를 수동 확인해야 합니다"
                exit 1
              fi
            
              

              if ! kubectl rollout undo deployment/gateway-service \
                --to-revision="$PREVIOUS_REVISION"; then
                echo "Revision $PREVIOUS_REVISION 롤백 명령이 실패했습니다"
                exit 1
              fi

              if ! kubectl rollout status deployment/gateway-service --timeout=210s; then
                echo "롤백 이후 Deployment가 정상 상태에 도달하지 못했습니다"
                exit 1
              fi

              RECOVERED_IMAGE="$(
                kubectl get deployment gateway-service \
                  -o jsonpath='{.spec.template.spec.containers[?(@.name=="gateway-service")].image}'
              )"

              if [ "$RECOVERED_IMAGE" != "$PREVIOUS_IMAGE" ]; then
                echo "롤백 이미지 검증 실패: expected=$PREVIOUS_IMAGE actual=$RECOVERED_IMAGE"
                exit 1
              fi

              echo "이전 Revision으로 롤백 완료: revision=$PREVIOUS_REVISION image=$RECOVERED_IMAGE"
              echo "롤백 기준: revision=$PREVIOUS_REVISION image=$PREVIOUS_IMAGE"
              echo "배포 대상: image=$IMAGE:$TARGET_TAG"
              exit 1
            fi

            echo "배포 완료: image=$IMAGE:$TARGET_TAG"

  notify:
    needs: [ test-and-coverage-sonarqube, build-and-push, deploy ]
    if: always()
    uses: nhnacademy-aiot3-yes-ai-do/Webhook/.github/workflows/discord-notify.yml@main

    with:
      service_name: gateway-service
      build_result: ${{ needs.build-and-push.result }}
      deploy_result: ${{ needs.deploy.result }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message }}
      actor: ${{ github.actor }}
      workflow_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}


      quality_result: ${{ needs.test-and-coverage-sonarqube.result }}
      coverage_result: ${{ needs.test-and-coverage-sonarqube.outputs.coverage_result }}
      coverage_percentage: ${{ needs.test-and-coverage-sonarqube.outputs.coverage_percentage || 'not_available' }}
      sonar_url: ${{ vars.SONAR_DASHBOARD_URL || 'not_available' }}

    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
